<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sally — Clinica Meridiem</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-100">

    <!-- Pagina di accesso: il modulo raccoglie le credenziali dell'utente, mentre la
         logica di autenticazione e il reindirizzamento per ruolo sono affidati a login.js -->
    <div class="card shadow-sm" style="width: 420px;">
        <div class="card-body p-5">

            <div class="text-center mb-4">
                <i class="bi bi-hospital fs-1 text-primary"></i>
                <h3 class="mt-2 fw-bold">Sally</h3>
                <p class="text-muted small">Clinica Meridiem — Gestione Percorsi</p>
            </div>

            <div id="errore" class="alert alert-danger d-none"></div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" id="email" class="form-control" placeholder="nome@meridiem.it">
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••">
            </div>

            <button onclick="login()" class="btn btn-primary w-100 py-2 fw-semibold">
                <i class="bi bi-box-arrow-in-right me-2"></i>Accedi
            </button>

            <hr class="my-4">
            <p class="text-muted small text-center mb-0">
                Accesso riservato al personale autorizzato
            </p>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
